<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expedition Decision Study</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #eef2f7; color: #1f2937; min-height: 100vh; padding: 32px 16px; line-height: 1.6;
}
.card {
  max-width: 700px; margin: 0 auto; background: #fff; border-radius: 24px;
  padding: 52px; box-shadow: 0 8px 40px rgba(15,23,42,0.09);
}
@media (max-width: 600px) { .card { padding: 32px 20px; } }

h1 { font-size: 32px; font-weight: 800; color: #111827; letter-spacing: -0.5px; margin-bottom: 6px; }
h2 { font-size: 24px; font-weight: 700; color: #111827; letter-spacing: -0.3px; margin-bottom: 18px; }
h3 { font-size: 12px; font-weight: 700; color: #6b7280; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.7px; }
p  { font-size: 15.5px; color: #4b5563; margin-bottom: 14px; }
strong { color: #111827; }

.progress-wrap { margin-bottom: 36px; }
.progress-meta { display: flex; justify-content: space-between; font-size: 13px; color: #9ca3af; font-weight: 500; margin-bottom: 8px; }
.progress-track { background: #e5e7eb; border-radius: 99px; height: 6px; overflow: hidden; }
.progress-fill  { background: linear-gradient(90deg,#3b82f6,#6366f1); height: 100%; border-radius: 99px; transition: width .4s ease; }

.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 13px 26px; border-radius: 12px; border: none;
  font-size: 15px; font-weight: 600; cursor: pointer; transition: all .15s ease;
}
.btn-primary   { background: #2563eb; color: #fff; }
.btn-primary:hover  { background: #1d4ed8; transform: translateY(-1px); box-shadow: 0 6px 18px rgba(37,99,235,.28); }
.btn-primary:active { transform: translateY(0); }
.btn-secondary { background: #f3f4f6; color: #374151; border: 1.5px solid #e5e7eb; }
.btn-secondary:hover { background: #e9ecf0; }
.btn-row { display: flex; gap: 12px; margin-top: 32px; align-items: center; flex-wrap: wrap; }

.choice-btn {
  display: block; width: 100%; padding: 20px 24px; border: 2.5px solid #e5e7eb;
  border-radius: 16px; background: #fff; cursor: pointer; text-align: left;
  transition: all .15s ease; margin-bottom: 14px;
}
.choice-btn:hover    { border-color: #3b82f6; background: #f0f6ff; }
.choice-btn.selected { border-color: #2563eb; background: #eff6ff; }
.choice-btn .c-title { font-weight: 700; font-size: 16px; color: #111827; margin-bottom: 5px; }
.choice-btn .c-desc  { font-size: 14px; color: #6b7280; line-height: 1.55; }
.choice-btn .c-cost  {
  display: inline-flex; align-items: center; gap: 5px; margin-top: 8px;
  font-size: 12.5px; font-weight: 600; color: #d97706;
  background: #fef3c7; padding: 3px 10px; border-radius: 99px;
}

.infobox { border-radius: 14px; padding: 18px 22px; margin: 20px 0; font-size: 15px; line-height: 1.65; border-left: 4px solid; }
.ib-blue   { background: #eff6ff; border-color: #3b82f6; }
.ib-amber  { background: #fffbeb; border-color: #f59e0b; }
.ib-green  { background: #f0fdf4; border-color: #22c55e; }
.ib-red    { background: #fef2f2; border-color: #ef4444; }
.ib-gray   { background: #f9fafb; border-color: #9ca3af; }
.ib-purple { background: #f5f3ff; border-color: #7c3aed; }

.coins-row {
  display: flex; align-items: center; gap: 14px; padding: 18px 22px;
  background: #fefce8; border-radius: 14px; border: 1.5px solid #fde68a; margin-bottom: 22px;
}
.coins-icon  { font-size: 30px; }
.coins-label { font-weight: 700; font-size: 18px; color: #92400e; }
.coins-sub   { font-size: 13px; color: #a16207; margin-top: 2px; }

.risk-box { background: #f9fafb; border-radius: 18px; padding: 26px 28px; margin: 24px 0; border: 1.5px solid #e5e7eb; }
.risk-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
.risk-label-text { font-size: 13px; font-weight: 700; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px; }
.risk-sublabel   { font-size: 13px; color: #9ca3af; margin-top: 3px; }
.risk-pct  { font-size: 44px; font-weight: 900; line-height: 1; }
.risk-bar  { background: #e5e7eb; height: 18px; border-radius: 9px; overflow: hidden; margin-bottom: 12px; }
.risk-fill { height: 100%; border-radius: 9px; transition: width .7s cubic-bezier(.4,0,.2,1); }
.risk-legend { display: flex; justify-content: space-between; font-size: 13px; color: #6b7280; flex-wrap: wrap; gap: 4px; }
.risk-legend span { display: flex; align-items: center; gap: 6px; }
.risk-dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }

/* Countdown */
.countdown-wrap { text-align: center; padding: 40px 20px; }
.countdown-circle {
  width: 140px; height: 140px; border-radius: 50%; border: 8px solid #e5e7eb;
  margin: 0 auto 20px; display: flex; align-items: center; justify-content: center;
  position: relative; font-size: 42px; font-weight: 900; color: #2563eb;
}
.countdown-ring { position: absolute; top: -8px; left: -8px; width: 140px; height: 140px; border-radius: 50%; transform: rotate(-90deg); }
.countdown-ring-fill { fill: none; stroke: #2563eb; stroke-width: 8; stroke-dasharray: 339; stroke-dashoffset: 0; stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
.countdown-label { font-size: 18px; font-weight: 600; color: #374151; margin-bottom: 8px; }
.countdown-sub   { font-size: 14px; color: #9ca3af; }

/* Likert */
.likert-group { margin-bottom: 30px; }
.likert-q { font-weight: 600; font-size: 15px; color: #1f2937; margin-bottom: 14px; line-height: 1.55; }
.likert-scale { display: grid; grid-template-columns: repeat(7,1fr); gap: 6px; }
.likert-scale input[type="radio"] { display: none; }
.likert-scale label {
  display: flex; align-items: center; justify-content: center; padding: 11px 4px;
  border: 2px solid #e5e7eb; border-radius: 10px; cursor: pointer;
  font-size: 14px; font-weight: 600; color: #9ca3af; transition: all .12s ease; user-select: none;
}
.likert-scale input[type="radio"]:checked + label { background: #2563eb; border-color: #2563eb; color: #fff; }
.likert-scale label:hover { border-color: #93c5fd; color: #2563eb; }
.likert-ends { display: flex; justify-content: space-between; font-size: 12px; color: #9ca3af; margin-top: 6px; padding: 0 2px; }

/* Comprehension */
.comp-item { margin-bottom: 28px; }
.comp-q    { font-weight: 600; font-size: 15px; color: #1f2937; margin-bottom: 12px; }
.radio-option {
  display: flex; align-items: flex-start; gap: 12px; padding: 13px 16px;
  border: 2px solid #e5e7eb; border-radius: 12px; cursor: pointer;
  margin-bottom: 9px; transition: all .12s ease; font-size: 15px;
}
.radio-option:hover      { border-color: #93c5fd; }
.radio-option.is-correct { border-color: #22c55e; background: #f0fdf4; }
.radio-option.is-wrong   { border-color: #ef4444; background: #fef2f2; }
.radio-option input      { margin-top: 3px; flex-shrink: 0; accent-color: #2563eb; }

/* Demographics form */
.form-group { margin-bottom: 22px; }
.form-label { display: block; font-weight: 600; font-size: 14px; color: #374151; margin-bottom: 6px; }
.form-label .optional { font-weight: 400; color: #9ca3af; font-size: 13px; margin-left: 4px; }
.form-input {
  width: 100%; padding: 12px 16px; border: 2px solid #e5e7eb; border-radius: 10px;
  font-size: 15px; color: #1f2937; outline: none; transition: border-color .15s;
  background: #fff;
}
.form-input:focus { border-color: #3b82f6; }
.form-input[readonly] { background: #f9fafb; color: #6b7280; }
.form-hint { font-size: 12.5px; color: #9ca3af; margin-top: 5px; }

/* Condition badge */
.cond-badge {
  display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px;
  border-radius: 99px; font-size: 13px; font-weight: 700; letter-spacing: 0.3px;
}
.cond-none { background: #fef3c7; color: #92400e; }
.cond-low  { background: #fee2e2; color: #991b1b; }
.cond-high { background: #d1fae5; color: #065f46; }

/* Summary table */
.summary-table { width: 100%; border-collapse: collapse; font-size: 14.5px; margin: 20px 0; }
.summary-table th { background: #f3f4f6; padding: 10px 14px; text-align: left; font-weight: 600; color: #374151; border-bottom: 2px solid #e5e7eb; }
.summary-table td { padding: 11px 14px; border-bottom: 1px solid #f3f4f6; vertical-align: middle; }
.summary-table tr:last-child td { border-bottom: none; }
.badge     { display: inline-block; padding: 3px 11px; border-radius: 99px; font-size: 12px; font-weight: 700; }
.badge-yes { background: #dcfce7; color: #166534; }
.badge-no  { background: #fee2e2; color: #991b1b; }

/* Save status */
.save-status { display: flex; align-items: center; gap: 8px; font-size: 14px; padding: 10px 0; }
.save-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.save-dot.saving  { background: #f59e0b; animation: pulse 1s infinite; }
.save-dot.saved   { background: #22c55e; }
.save-dot.failed  { background: #ef4444; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.4; } }

.divider  { border: none; border-top: 1px solid #e5e7eb; margin: 28px 0; }
.text-sm  { font-size: 13px; color: #9ca3af; }
.mt-16 { margin-top: 16px; }
.mt-24 { margin-top: 24px; }
.error-msg { color: #dc2626; font-size: 13.5px; margin-top: 10px; font-weight: 500; }
.hidden { display: none !important; }
.step-pill {
  display: inline-block; background: #eff6ff; color: #2563eb;
  font-size: 12px; font-weight: 700; padding: 4px 12px; border-radius: 99px;
  letter-spacing: 0.4px; margin-bottom: 14px; text-transform: uppercase;
}

/* Round block in Likert end screen */
.round-block {
  border-top: 1px solid #e5e7eb; padding-top: 28px; margin-top: 28px;
}
.round-block:first-child { border-top: none; padding-top: 0; margin-top: 0; }
.round-header {
  background: #f9fafb; border-radius: 12px; padding: 14px 18px; margin-bottom: 22px;
  font-size: 14px; color: #374151;
}
.round-header strong { color: #111827; }
</style>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

</head>

<script>

// ═══════════════════════════════════════════════════════════════
//  CONDITION ASSIGNMENT
//
//  BETWEEN-SUBJECTS via URL parameter:
//    ?condition=none   → No Instrumentality  (H1: probability reversal)
//    ?condition=low    → Low Instrumentality  (intermediate)
//    ?condition=high   → High Instrumentality (H2: instrumentality reversal)
//
//  If not in URL, randomly assigned 50/50 between 'none' and 'high'.
// ═══════════════════════════════════════════════════════════════

const CFG = {
  studyName:    'Reassurance-Seeking Experiment — Study 3',
  endowment:    105,   // total points given to participant
  coins:        100,   // points at stake on the expedition bet
  probabilities: [0.10, 0.25, 0.50, 0.75, 0.90],
  conditions: {
    none: {
      label:      'No Instrumentality',
      cls:        'cond-none',

      ifBadNews:  'there is <strong>nothing you can do</strong> — the result is final. You lose all 100 coins.',

    },
    low: {
      label:      'Low Instrumentality',
      cls:        'cond-low',
      recoverable: 20,
      ifBadNews:  'you can make a small corrective adjustment — saving <strong>20 coins</strong> (you lose 80 instead of 100).',
      nowDesc:    'Send the messenger and learn the result. If bad news: small adjustment saves 20 coins (you lose 80). If good news: keep your coins (minus the messenger fee).',
      waitDesc:   'Find out in 1 week when payments are processed — but too late for the adjustment. You\'d lose all 100 points on bad news.',
      debrief:    'In your condition, information had <strong>limited practical value</strong> (saves only 20 of 100 coins on bad news). Our theory predicts that reassurance-seeking still dominates over instrumental value, especially at low mishap probabilities.'
    },
    high: {
      label:      'High Instrumentality',
      cls:        'cond-high',
      recoverable: 60,
      ifBadNews:  'you <strong>can redirect</strong> the expedition to a backup route — saving <strong>60 coins</strong> (you lose only 40 instead of 100).',
      nowDesc:    'Send the messenger and learn the result. If bad news: redirect saves 60 coins (you lose only 40). If good news: keep your coins (minus the messenger fee).',
      waitDesc:   'Find out in 1 week when payments are processed — but too late to redirect. You\'d lose all 100 points on bad news.',
      debrief:    'In your condition, information had <strong>high practical value</strong> (saves 60 of 100 coins on bad news). Our theory predicts that instrumental value increases information-seeking, especially at higher mishap probabilities where bad news is more likely.'
    }
  }
};

// ═══════════════════════════════════════════════════════════════
//  FIREBASE INIT (runs once at load if config is provided)
// ═══════════════════════════════════════════════════════════════
let _db = null;
(function initFirebase() {
  if (!RESEARCHER.firebaseConfig) return;
  try {
    firebase.initializeApp(RESEARCHER.firebaseConfig);
    _db = firebase.firestore();
    // Enable offline persistence so a brief connectivity blip doesn't lose data
    _db.enablePersistence({ synchronizeTabs: true }).catch(() => {});
  } catch (e) {
    console.warn('Firebase init failed:', e);
  }
})();

// ═══════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════
const S = {
  screen:       'welcome',
  condition:    null,
  conditionSource: null,
  pid:          null,
  prolificPID:  null,
  studyID:      null,
  sessionID:    null,
  platform:     null,
  participantID:    '',
  participantName:  '',

  trialOrder:   [],
  currentTrial: 0,

  currentOutcome: null,   // true = mishap occurred, false = no mishap, null = not contacted
  trialStartTime: null,

  countdownInterval:  null,
  countdownRemaining: 0,

  debugMode: false,    // set to true via ?debug=1 in URL — shows researcher info
  // Post-experiment survey (collected at likert_end)
  survey: {
    reassurance:    null,  // 1–7: "I contacted hoping for reassuring news"
    fear_avoidance: null,  // 1–7: "At higher probabilities I avoided contact to avoid bad news"
    instrumental:   null,  // 1–7: "I mainly contacted to take corrective action"
    curiosity:      null,  // 1–7: "I contacted simply because I was curious"
    pattern:        null,  // categorical: more_low | more_high | no_pattern | always | never
    open_response:  ''     // free text
  }
};

// ═══════════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════════
function uid() { return 'P' + Date.now().toString(36).toUpperCase() + Math.random().toString(36).slice(2,6).toUpperCase(); }
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function pct(p)      { return (p*100).toFixed(0)+'%'; }
function riskColor(p){ return p<=.20?'#22c55e':p<=.40?'#84cc16':p<=.60?'#f59e0b':p<=.80?'#f97316':'#ef4444'; }
function riskWord(p) { return p<=.15?'Very Low Risk':p<=.35?'Low Risk':p<=.65?'Moderate Risk':p<=.80?'High Risk':'Very High Risk'; }
function cond()      { return CFG.conditions[S.condition]; }
function drawOutcome(p) { return Math.random() < p; } // true = mishap

function render() {
  if (S.countdownInterval) { clearInterval(S.countdownInterval); S.countdownInterval=null; }
  const fn = {
    welcome:       renderWelcome,
    demographics:  renderDemographics,
    instructions:  renderInstructions,
    comprehension: renderComprehension,
    practice:      renderPractice,
    trial:         renderTrial,
    waiting:       renderWaiting,
    result:        renderResult,
    likert_end:    renderLikertEnd,
    end:           renderEnd
  }[S.screen] || renderWelcome;
  document.getElementById('root').innerHTML = fn();
  if (S.screen === 'waiting') startCountdown();
  if (S.screen === 'end')     attemptSheetsSave();
}

function go(screen) { S.screen=screen; window.scrollTo(0,0); render(); }

// ═══════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════
function init() {
  const p = new URLSearchParams(window.location.search);

  S.debugMode = p.get('debug') === '1';

  const c = p.get('condition');
  if (c==='none'||c==='low'||c==='high') { S.condition=c; S.conditionSource='url'; }
  else { S.condition=Math.random()<.5?'none':'high'; S.conditionSource='random'; }

  const prolificPID = p.get('PROLIFIC_PID') || p.get('prolific_pid');
  const mturkWorker = p.get('workerId') || p.get('worker_id');
  if (prolificPID) {
    S.prolificPID  = prolificPID;
    S.studyID      = p.get('STUDY_ID') || p.get('study_id') || '';
    S.sessionID    = p.get('SESSION_ID') || p.get('session_id') || '';
    S.platform     = 'prolific';
    S.participantID = prolificPID;
  } else if (mturkWorker) {
    S.platform     = 'mturk';
    S.participantID = mturkWorker;
  } else {
    S.platform     = 'manual';
  }

  S.pid = p.get('pid') || S.participantID || uid();
  S.trialOrder = shuffle([...CFG.probabilities]);
  render();
}

// ═══════════════════════════════════════════════════════════════
//  SCREEN: WELCOME
// ═══════════════════════════════════════════════════════════════

  const cd = cond();
  const sourceNote = S.conditionSource==='url'
    ? '✓ Set by researcher via URL parameter'
    : '⚡ Randomly assigned (50/50 between None and High)';
  return `
<div class="card">
  <span class="step-pill">Welcome</span>

    Payments will be made <strong>${RESEARCHER.paymentDelay} from today</strong>. Please treat each decision as if it counts.
  </div>

  <p>The study takes about 10–12 minutes.</p>

  ${S.debugMode ? `
  <hr class="divider">
  <h3>🔬 Researcher Debug Info</h3>

function checkComp(q1c, q2c) {
  const a1=S.compAnswers.q1, a2=S.compAnswers.q2;
  if (!a1||!a2) { showErr('comp-error','Please answer both questions.'); return; }
  ['a','b','c'].forEach(v=>{
    const e1=document.getElementById('q1-'+v), e2=document.getElementById('q2-'+v);
    [e1,e2].forEach(e=>e.classList.remove('is-correct','is-wrong'));
    if(v===q1c) e1.classList.add('is-correct'); else if(v===a1&&a1!==q1c) e1.classList.add('is-wrong');
    if(v===q2c) e2.classList.add('is-correct'); else if(v===a2&&a2!==q2c) e2.classList.add('is-wrong');
  });
  if(a1!==q1c||a2!==q2c){
    S.compErrors++;
    showErr('comp-error','Some answers incorrect (red). Correct answers highlighted green. Please re-read and try again.');
    return;
  }
  S.compAnswers={q1:null,q2:null};
  go('practice');
}

function showErr(id, msg) {
  const el=document.getElementById(id);
  if(el){el.textContent=msg;el.classList.remove('hidden');}

  document.getElementById('trial-err').classList.add('hidden');

function submitTrial() {
  if (!S.currentChoice) { document.getElementById('trial-err').classList.remove('hidden'); return; }
  S.responses.push({
    trial:         S.currentTrial+1,
    probability:   S.trialOrder[S.currentTrial],
    seek_now:      S.currentChoice==='now'?1:0,
    rt_decision_ms: Date.now()-S.trialStartTime,
    rt_wait_ms:    0,
    outcome:       null,   // filled in if they contact the expedition
    reassurance:   null,   // filled in at likert_end
    fear:          null,
    action:        null
  });

  if (S.currentChoice === 'now') {
    if (RESEARCHER.waitSecs > 0) {
      S.countdownRemaining = RESEARCHER.waitSecs;
      go('waiting');
    } else {
      // Testing mode: skip countdown, draw outcome immediately
      revealOutcome();
      go('result');
    }
  } else {
    // Wait choice: advance directly to next trial (no result revealed)
    S.currentChoice = null;
    advanceTrial();
  }
}

function renderWaiting() {
  const p=S.trialOrder[S.currentTrial];
  const circ=2*Math.PI*54;
  return `
<div class="card">
  <div class="infobox ib-purple" style="margin-bottom:32px;">
    📡 <strong>Messenger dispatched.</strong> Waiting for them to travel to the expedition and return with news…
  </div>
  <div class="countdown-wrap">
    <div class="countdown-circle">
      <svg class="countdown-ring" viewBox="0 0 140 140">
        <circle cx="70" cy="70" r="54" fill="none" stroke="#e5e7eb" stroke-width="8"/>
        <circle class="countdown-ring-fill" id="ring-fill" cx="70" cy="70" r="54"
          stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="0"/>
      </svg>
      <span id="countdown-num">${RESEARCHER.waitSecs}</span>
    </div>
    <div class="countdown-label" id="countdown-label">Messenger en route…</div>
    <div class="countdown-sub">This round: <strong>${pct(p)} mishap probability</strong></div>
  </div>
  <div id="countdown-done" class="hidden" style="text-align:center;margin-top:24px;">
    <div class="infobox ib-blue" style="margin-bottom:20px;">📬 The messenger has returned with news!</div>
    <button class="btn btn-primary" onclick="afterWait()">See what they found →</button>
  </div>
</div>`;
}

function startCountdown() {
  const circ=2*Math.PI*54;
  let remaining=S.countdownRemaining;
  const waitStart=Date.now();
  S.countdownInterval=setInterval(()=>{
    remaining--;
    const num=document.getElementById('countdown-num');
    const ring=document.getElementById('ring-fill');
    const lbl=document.getElementById('countdown-label');
    if(!num){clearInterval(S.countdownInterval);return;}
    num.textContent=remaining;
    if(ring) ring.style.strokeDashoffset=(circ*(1-remaining/RESEARCHER.waitSecs)).toFixed(1);
    if(remaining<=10&&lbl) lbl.textContent='Almost there…';
    if(remaining<=0){
      clearInterval(S.countdownInterval); S.countdownInterval=null;
      const resp=S.responses[S.responses.length-1];
      if(resp) resp.rt_wait_ms=Date.now()-waitStart;
      if(num) num.textContent='0';
      if(lbl) lbl.textContent='Messenger returned!';
      const done=document.getElementById('countdown-done');
      if(done) done.classList.remove('hidden');
    }
  },1000);
}

function revealOutcome() {
  const p = S.trialOrder[S.currentTrial];
  S.currentOutcome = drawOutcome(p);
  const resp = S.responses[S.responses.length-1];
  if (resp) resp.outcome = S.currentOutcome ? 'mishap' : 'none';
}

function afterWait() {
  revealOutcome();
  go('result');
}

  const total = S.trialOrder.length;

  let headline, body, boxCls;
  const fee = RESEARCHER.scoutFee;
  if (!mishap) {
    headline = '✅ Good news — no mishap!';
    body = `The expedition is safe. No corrective action needed.
      <br><br><em>If this round is selected: <strong>${CFG.endowment - fee} points</strong> (105 − ${fee} messenger fee = ${CFG.endowment - fee} pts = $${((CFG.endowment - fee) * RESEARCHER.pointValue).toFixed(2)}).</em>`;
    boxCls = 'ib-green';
  } else if (S.condition === 'none') {
    headline = '⚠️ Bad news — a mishap occurred.';
    body = `There is nothing you can do — the result is final. You lose the 100-point bet.
      <br><br><em>If this round is selected: <strong>${fee > 0 ? 0 : 0} points</strong> (you lose the 100-pt bet; messenger fee already spent = 0 pts = $0.00).</em>`;
    boxCls = 'ib-red';
  } else if (S.condition === 'low') {
    headline = '⚠️ Bad news — a mishap occurred.';
    body = `You make a small corrective adjustment, saving 20 points. You lose 80 instead of 100.
      <br><br><em>If this round is selected: <strong>${CFG.endowment - fee - 80} points</strong> (105 − ${fee} fee − 80 loss = ${CFG.endowment - fee - 80} pts = $${((CFG.endowment - fee - 80) * RESEARCHER.pointValue).toFixed(2)}).</em>`;
    boxCls = 'ib-amber';
  } else {
    headline = '⚠️ Bad news — a mishap occurred.';
    body = `You redirect the expedition to a backup route, saving 60 points. You lose only 40 instead of 100.
      <br><br><em>If this round is selected: <strong>${CFG.endowment - fee - 40} points</strong> (105 − ${fee} fee − 40 loss = ${CFG.endowment - fee - 40} pts = $${((CFG.endowment - fee - 40) * RESEARCHER.pointValue).toFixed(2)}).</em>`;
    boxCls = 'ib-amber';
  }

  return `
<div class="card">
  <div class="progress-wrap">
    <div class="progress-meta"><span>Round ${round} of ${total} — Result</span><span>${pct(p)} mishap probability</span></div>
    <div class="progress-track"><div class="progress-fill" style="width:${(round/total)*100}%"></div></div>
  </div>
  <h2>The Messenger's Report</h2>
  <div class="infobox ${boxCls}" style="font-size:16px;">
    <strong>${headline}</strong><br><br>${body}
  </div>
  <div class="btn-row">
    <button class="btn btn-primary" onclick="afterResult()">
      ${isLast ? 'Answer Questions →' : 'Next Round →'}
    </button>
  </div>
</div>`;
}

function afterResult() {
  S.currentOutcome = null;
  S.currentChoice = null;
  advanceTrial();
}

function advanceTrial() {
  S.currentTrial++;
  if (S.currentTrial < S.trialOrder.length) {
    S.trialStartTime = Date.now();
    go('trial');
  } else {
    go('likert_end');
  }
}

// ═══════════════════════════════════════════════════════════════
//  SCREEN: POST-EXPERIMENT SURVEY
// ═══════════════════════════════════════════════════════════════
function renderLikertEnd() {
  // Build a brief summary of their choices for context
  const sorted = [...S.responses].sort((a,b) => a.probability - b.probability);
  const choiceSummary = sorted.map(r =>
    `<span style="display:inline-flex;align-items:center;gap:5px;margin:3px 4px;font-size:13px;background:${r.seek_now?'#eff6ff':'#f9fafb'};border:1px solid ${r.seek_now?'#bfdbfe':'#e5e7eb'};border-radius:99px;padding:3px 11px;font-weight:600;color:${r.seek_now?'#1d4ed8':'#6b7280'};">
      ${pct(r.probability)}: ${r.seek_now?'📡 Sent':'⏳ Waited'}
    </span>`
  ).join('');

  function lk(name, q) {
    const opts = [1,2,3,4,5,6,7].map(v =>
      `<input type="radio" name="${name}" id="${name}_${v}" value="${v}"><label for="${name}_${v}">${v}</label>`
    ).join('');
    return `<div class="likert-group">
      <div class="likert-q">${q}</div>
      <div class="likert-scale">${opts}</div>
      <div class="likert-ends"><span>Strongly Disagree</span><span>Strongly Agree</span></div>
    </div>`;
  }

  const patternOpts = [
    ['more_low',  '📉 I sent the messenger more when the mishap probability was <strong>low</strong>'],
    ['more_high', '📈 I sent the messenger more when the mishap probability was <strong>high</strong>'],
    ['no_pattern','🔀 My choices didn\'t follow a clear pattern across probability levels'],
    ['always',    '✅ I sent the messenger in every round'],
    ['never',     '⏳ I never sent the messenger']
  ];

  return `
<div class="card">
  <span class="step-pill">Reflection</span>
  <h2>A Few Questions</h2>
  <p>You've completed all 5 rounds. Here's a quick summary of your choices:</p>
  <div style="margin-bottom:24px;line-height:2;">${choiceSummary}</div>

  <hr class="divider">

  <h3>Your Pattern of Choices</h3>
  <p style="font-size:15px;color:#374151;margin-bottom:18px;">Which best describes how your choices changed (or didn't) as the mishap probability increased?</p>
  ${patternOpts.map(([val,label])=>`
  <label class="radio-option" id="pat-${val}">
    <input type="radio" name="pattern" value="${val}" onchange="S.survey.pattern='${val}'">
    <span>${label}</span>
  </label>`).join('')}

  <div style="margin-top:20px;">
    <div class="likert-q" style="margin-bottom:10px;">In your own words — why did you make the choices you did? What was going through your mind?</div>
    <textarea id="open-response" rows="4" placeholder="Describe your reasoning here…"
      style="width:100%;padding:12px 16px;border:2px solid #e5e7eb;border-radius:10px;font-size:15px;font-family:inherit;resize:vertical;outline:none;"
      oninput="S.survey.open_response=this.value"
      onfocus="this.style.borderColor='#3b82f6'"
      onblur="this.style.borderColor='#e5e7eb'"></textarea>
  </div>

  <hr class="divider">

  <h3>What Drove Your Decisions?</h3>
  <p style="font-size:14px;color:#6b7280;margin-bottom:22px;">Rate how much each statement describes your overall motivation across the rounds. Use 1 (Strongly Disagree) to 7 (Strongly Agree).</p>

  ${lk('reassurance', '1. &ldquo;I sent the messenger mainly to get <strong>reassuring news</strong> — hoping to hear that everything was fine.&rdquo;')}
  ${lk('fear_avoid',  '2. &ldquo;At <strong>higher mishap probabilities</strong>, I was less willing to contact the expedition because I <strong>feared receiving bad news</strong>.&rdquo;')}
  ${lk('instrumental','3. &ldquo;I sent the messenger mainly because I wanted to be able to <strong>take corrective action</strong> if something had gone wrong.&rdquo;')}
  ${lk('curiosity',   '4. &ldquo;I sent the messenger simply because I was <strong>curious</strong> about what had happened — I just wanted to know.&rdquo;')}

  <div id="likert-err" class="error-msg hidden">Please answer all three rating questions and select a pattern before continuing.</div>
  <div class="btn-row">
    <button class="btn btn-primary" onclick="submitLikertEnd()">Complete Study →</button>
  </div>
</div>`;
}

function submitLikertEnd() {
  const r   = document.querySelector('input[name="reassurance"]:checked');
  const f   = document.querySelector('input[name="fear_avoid"]:checked');
  const a   = document.querySelector('input[name="instrumental"]:checked');
  const cur = document.querySelector('input[name="curiosity"]:checked');
  const pat = S.survey.pattern;

  if (!r || !f || !a || !cur || !pat) {
    showErr('likert-err', 'Please answer all four rating questions and select a choice pattern before continuing.');
    return;
  }

  S.survey.reassurance    = parseInt(r.value);
  S.survey.fear_avoidance = parseInt(f.value);
  S.survey.instrumental   = parseInt(a.value);
  S.survey.curiosity      = parseInt(cur.value);
  S.survey.open_response  = document.getElementById('open-response').value.trim();

  go('end');
}

// ═══════════════════════════════════════════════════════════════
//  SCREEN: END
// ═══════════════════════════════════════════════════════════════
function renderEnd() {
  const cd=cond();
  const seekCount=S.responses.filter(r=>r.seek_now).length;
  const total=S.responses.length;
  const sorted=[...S.responses].sort((a,b)=>a.probability-b.probability);
  const rows=sorted.map(r=>{
    const outcomeCell = r.outcome === 'mishap'
      ? '<span class="badge" style="background:#fee2e2;color:#991b1b;">Mishap</span>'
      : r.outcome === 'none'
      ? '<span class="badge" style="background:#dcfce7;color:#166534;">No Mishap</span>'
      : '<span style="color:#9ca3af;font-size:13px;">—</span>';
    return `
    <tr>
      <td><strong>${pct(r.probability)}</strong></td>
      <td><span class="badge ${r.seek_now?'badge-yes':'badge-no'}">${r.seek_now?'Sent Messenger':'Waited'}</span></td>
      <td style="text-align:center">${outcomeCell}</td>
      <td style="text-align:center">${r.reassurance??'—'}</td>
      <td style="text-align:center">${r.fear??'—'}</td>
      <td style="text-align:center">${r.action??'—'}</td>
    </tr>`;
  }).join('');

  const prolificBtn = RESEARCHER.prolificCompletionURL
    ? `<a class="btn btn-primary" href="${RESEARCHER.prolificCompletionURL}" target="_blank">✅ Complete on Prolific →</a>` : '';

  const prolificCode = RESEARCHER.prolificCompletionCode
    ? `<hr class="divider">
  <h3>Prolific Completion Code</h3>
  <p style="margin-bottom:12px;">Please copy this code and paste it into Prolific to confirm your submission and receive payment:</p>
  <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
    <div style="font-size:28px;font-weight:900;letter-spacing:4px;color:#2563eb;background:#eff6ff;border:2px solid #bfdbfe;padding:14px 28px;border-radius:12px;">${RESEARCHER.prolificCompletionCode}</div>
    <button class="btn btn-secondary" onclick="navigator.clipboard.writeText('${RESEARCHER.prolificCompletionCode}').then(()=>{this.textContent='Copied!';setTimeout(()=>this.textContent='Copy Code',1500)})">Copy Code</button>
  </div>` : '';

  return `
<div class="card">
  <div class="text-center" style="padding-bottom:8px;">
    <div style="font-size:60px;margin-bottom:16px;">🏆</div>
    <h1 style="margin-bottom:10px;">Study Complete!</h1>
    <p style="font-size:17px;color:#374151;">You sent the messenger in <strong>${seekCount} of ${total}</strong> rounds.</p>
  </div>

  <hr class="divider">
  <h3>Data Backup Status</h3>
  <div id="save-status-area">
    <div class="save-status">
      <span class="save-dot saving" id="save-dot"></span>
      <span id="save-msg">${RESEARCHER.firebaseConfig?'Saving to Firebase…':RESEARCHER.sheetsWebAppURL?'Saving to Google Sheets…':'Auto-save not configured — please download your data below.'}</span>
    </div>
  </div>

  <hr class="divider">
  <h3>Your Choices Across Risk Levels</h3>
  <table class="summary-table">
    <thead><tr>
      <th>Mishap Risk</th>
      <th>Your Choice</th>
      <th style="text-align:center">Outcome</th>
      <th style="text-align:center">Reassurance</th>
      <th style="text-align:center">Fear</th>
      <th style="text-align:center">Action</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>

  ${prolificCode}

  <hr class="divider">
  <h3>About This Study</h3>
  <div class="infobox ib-blue">${cd.debrief}</div>

  <hr class="divider">
  <h3>Download Your Data</h3>
  <p class="text-sm" style="margin-bottom:14px;">
    Participant ID: <strong>${S.pid}</strong> &nbsp;·&nbsp;
    Condition: <span class="cond-badge ${cd.cls}">${cd.label}</span> &nbsp;·&nbsp;
    Comprehension errors: <strong>${S.compErrors}</strong>
  </p>
  <div class="btn-row">
    ${prolificBtn}
    <button class="btn btn-primary"   onclick="dlCSV()">⬇ Download CSV</button>
    <button class="btn btn-secondary" onclick="dlJSON()">⬇ Download JSON</button>
  </div>
</div>`;
}

// ═══════════════════════════════════════════════════════════════
//  AUTO-SAVE  (Firebase primary → Google Sheets fallback)
// ═══════════════════════════════════════════════════════════════
function attemptSheetsSave() {   // called from render() — name kept for compatibility
  if (_db) {
    saveToFirebase();
  } else if (RESEARCHER.sheetsWebAppURL) {
    saveToSheets();
  } else {
    updateSaveUI('failed', 'Auto-save not configured. Please download CSV below.');
  }
}

function saveToFirebase() {
  updateSaveUI('saving', 'Saving to Firebase…');
  const payload = buildPayload();
  // Use pid as document ID — prevents duplicate documents if page is reloaded
  _db.collection('responses').doc(S.pid).set(payload)
    .then(() => {
      updateSaveUI('saved', '✅ Data saved to Firebase. Download CSV below as your own backup.');
      // Also attempt Sheets as a secondary backup (don't update UI on result)
      if (RESEARCHER.sheetsWebAppURL) saveToSheetsSilent();
    })
    .catch(err => {
      console.warn('Firebase save failed, trying Sheets:', err);
      updateSaveUI('saving', '⚠️ Firebase failed — trying backup server…');
      if (RESEARCHER.sheetsWebAppURL) {
        saveToSheets();
      } else {
        updateSaveUI('failed', `⚠️ Save failed: ${err.message}. Download CSV below.`);
      }
    });
}

function saveToSheets() {
  updateSaveUI('saving', 'Saving to Google Sheets…');
  const payload = buildPayload();
  const url = RESEARCHER.sheetsWebAppURL + '?data=' + encodeURIComponent(JSON.stringify(payload));
  fetch(url)
    .then(r => r.json())
    .then(resp => {
      if (resp.status === 'ok') {
        updateSaveUI('saved', `✅ ${resp.rows} rows saved to Google Sheets. Download CSV as backup.`);
      } else {
        updateSaveUI('failed', `⚠️ Sheets error: ${resp.message || 'unknown'}. Download CSV below.`);
      }
    })
    .catch(err => {
      updateSaveUI('failed', `⚠️ Save failed: ${err.message}. Download CSV below.`);
    });
}

function saveToSheetsSilent() {
  const payload = buildPayload();
  const url = RESEARCHER.sheetsWebAppURL + '?data=' + encodeURIComponent(JSON.stringify(payload));
  fetch(url).catch(() => {});  // silent fallback — Firebase already confirmed save
}

function updateSaveUI(status, msg) {
  S.saveStatus = status;
  const dot = document.getElementById('save-dot');
  const txt = document.getElementById('save-msg');
  if (dot) { dot.className = 'save-dot ' + status; }
  if (txt) { txt.textContent = msg; }
}

function buildPayload() {
  return {
    study:             CFG.studyName,
    timestamp:         new Date().toISOString(),
    pid:               S.pid,
    prolific_pid:      S.prolificPID || '',
    participant_name:  S.participantName,
    participant_email: S.participantEmail,
    study_id:          S.studyID || '',
    session_id:        S.sessionID || '',
    condition:         S.condition,
    condition_label:   cond().label,
    condition_source:  S.conditionSource,
    platform:          S.platform,
    comp_errors:       S.compErrors,
    scout_fee:         RESEARCHER.scoutFee,
    wait_secs:         RESEARCHER.waitSecs,
    trial_order:       S.trialOrder.map(p=>+(p.toFixed(2))),
    survey_reassurance:    S.survey.reassurance,
    survey_fear_avoidance: S.survey.fear_avoidance,
    survey_instrumental:   S.survey.instrumental,
    survey_curiosity:      S.survey.curiosity,
    survey_pattern:        S.survey.pattern,
    survey_open:           S.survey.open_response,
    responses:             S.responses
  };
}

// ═══════════════════════════════════════════════════════════════
//  DATA EXPORT (CSV + JSON)
// ═══════════════════════════════════════════════════════════════
function dlCSV() {
  const cols = [
    'pid','prolific_pid','participant_name','participant_email',
    'platform','condition','condition_label','condition_source',
    'trial','probability','seek_now','outcome',
    'rt_decision_ms','rt_wait_ms',
    'comp_errors','scout_fee',
    'survey_reassurance','survey_fear_avoidance','survey_instrumental','survey_curiosity','survey_pattern','survey_open',
    'timestamp'
  ];
  const ts = new Date().toISOString();
  const rows = S.responses.map(r => [
    S.pid, S.prolificPID||'', S.participantName, S.participantEmail,
    S.platform, S.condition, cond().label, S.conditionSource,
    r.trial, r.probability.toFixed(2), r.seek_now, r.outcome??'',
    r.rt_decision_ms, r.rt_wait_ms??0,
    S.compErrors, RESEARCHER.scoutFee,
    S.survey.reassurance??'', S.survey.fear_avoidance??'', S.survey.instrumental??'', S.survey.curiosity??'',
    S.survey.pattern??'', `"${(S.survey.open_response||'').replace(/"/g,'""')}"`,
    ts
  ].map(v=>typeof v === 'string' && v.startsWith('"') ? v : (String(v).includes(',') ? `"${v}"` : v)).join(','));
  dlFile([cols.join(','),...rows].join('\n'), `RS_${S.pid}.csv`, 'text/csv');
}

function dlJSON() {
  dlFile(JSON.stringify(buildPayload(), null, 2), `RS_${S.pid}.json`, 'application/json');
}

function dlFile(content, name, mime) {
  const url=URL.createObjectURL(new Blob([content],{type:mime}));
  const a=Object.assign(document.createElement('a'),{href:url,download:name});
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ═══════════════════════════════════════════════════════════════
//  START
// ═══════════════════════════════════════════════════════════════
init();
</script>
</body>
</html>
